name: Release Packages

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            rpm rpm2cpio createrepo-c \
            libdbus-1-dev libpam-dev curl bzip2

      - name: Build Debian and Ubuntu packages
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          VERSION="${TAG_NAME#v}"
          if [[ -z "$VERSION" ]]; then
            echo "Unable to derive version from tag $TAG_NAME" >&2
            exit 1
          fi

          build_deb_container() {
            local image="$1"
            local distro="$2"
            local suite="$3"
            local artifact_label="$4"
            local container_tag="chissu-deb-${artifact_label}"

            docker build \
              --build-arg BASE_IMAGE="$image" \
              --tag "$container_tag" \
              -f build/package/debian/Dockerfile \
              .

            docker run --rm \
              --user "$(id -u):$(id -g)" \
              -e HOME=/tmp/chissu-home \
              -e CARGO_HOME=/workspace/.cargo-home \
              -v "$PWD":/workspace \
              -w /workspace \
              "$container_tag" \
              ./build/package-deb.sh \
                --distro "$distro" \
                --suite "$suite" \
                --artifact-label "$artifact_label" \
                --version "$VERSION"
          }

          build_deb_container debian:12 debian bookworm debian-12
          build_deb_container ubuntu:24.04 ubuntu noble ubuntu-24.04
          build_deb_container ubuntu:25.10 ubuntu questing ubuntu-25.10

      - name: Build RPM package
        env:
          TAG_NAME: ${{ github.ref_name }}
          CARGO_HOME: ${{ github.workspace }}/.cargo-home
        run: |
          VERSION="${TAG_NAME#v}"
          ./build/package-rpm.sh --distro fedora --version "$VERSION" --skip-build

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist/chissu-pam_*_amd64.deb
            dist/chissu-pam_*.rpm
